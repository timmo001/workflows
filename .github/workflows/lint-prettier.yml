name: Lint - Prettier

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_call:
    inputs:
      file-types:
        required: false
        type: string
        default: "{js,json,ts,tsx,yml,yaml}"
      code-path:
        required: false
        type: string
        default: "."
      use-bun:
        required: false
        type: boolean
        default: false
      use-pnpm:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      file-types:
        required: false
        type: string
        default: "{js,json,ts,tsx,yml,yaml}"

jobs:
  lint-prettier:
    name: 👕 Prettier
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
      - name: 🥖 Install Bun
        if: ${{ inputs.use-bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: 🍎 Install pnpm
        if: ${{ inputs.use-pnpm }}
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: 🏗️ Set up Node.js (pnpm)
        if: ${{ inputs.use-pnpm && github.event_name == 'workflow_call' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache-dependency-path: ${{ inputs.code-path || '.' }}/**/pnpm-lock.yaml
          cache: pnpm
          check-latest: true
          node-version: 22.x
      - name: 🏗️️ Set up Node.js (yarn)
        if: ${{ !inputs.use-bun && !inputs.use-pnpm && github.event_name == 'workflow_call' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache-dependency-path: ${{ inputs.code-path || '.' }}/**/yarn.lock
          cache: yarn
          check-latest: true
          node-version: 22.x
      - name: 🏗️️ Set up Node.js
        if: ${{ github.event_name != 'workflow_call' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          check-latest: true
          node-version: 22.x
      - name: ⤵️ Install dependencies
        if: ${{ github.event_name == 'workflow_call' }}
        run: |
          if [ ${{ inputs.use-pnpm }} ]; then
              pnpm install
          elif [ ${{ inputs.use-bun }} ]; then
              bun install
          else
              yarn install
          fi
        working-directory: ${{ inputs.code-path }}
      - name: 🚀 Run Prettier
        run: |
          if [ ${{ inputs.use-pnpm }} ]; then
              pnpx prettier --check **/*.${{ inputs.file-types || '{json,yml}' }}
          elif [ ${{ inputs.use-bun }} ]; then
              bun run prettier --check **/*.${{ inputs.file-types || '{json,yml}' }}
          else
              npx prettier --check **/*.${{ inputs.file-types || '{json,yml}' }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ inputs.code-path || '.' }}
