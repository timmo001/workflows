name: Lint - Prettier

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        type: string
        # renovate: datasource=node-version depName=node versioning=node
        default: "26.5.0"
      file-types:
        required: false
        type: string
        default: "{js,json,ts,tsx,yml,yaml}"
      code-path:
        required: false
        type: string
        default: "."
      use-bun:
        required: false
        type: boolean
        default: false
      use-pnpm:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      file-types:
        required: false
        type: string
        default: "{js,json,ts,tsx,yml,yaml}"

jobs:
  lint-prettier:
    name: 👕 Prettier
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
      - name: 🥖 Install Bun
        if: ${{ inputs.use-bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: 🍎 Install pnpm
        if: ${{ inputs.use-pnpm }}
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: 🏗️ Set up Node.js (pnpm)
        if: ${{ inputs.use-pnpm && github.event_name == 'workflow_call' }}
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          cache-dependency-path: ${{ inputs.code-path || '.' }}/**/pnpm-lock.yaml
          cache: pnpm
          check-latest: true
          node-version: ${{ inputs.node-version }}
      - name: 🏗️️ Set up Node.js (yarn)
        if: ${{ !inputs.use-bun && !inputs.use-pnpm && github.event_name == 'workflow_call' }}
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          cache-dependency-path: ${{ inputs.code-path || '.' }}/**/yarn.lock
          cache: yarn
          check-latest: true
          node-version: ${{ inputs.node-version }}
      - name: 🏗️️ Set up Node.js
        if: ${{ github.event_name != 'workflow_call' }}
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          check-latest: true
          # renovate: datasource=node-version depName=node versioning=node
          node-version: ${{ inputs.node-version || '26.5.0' }}
      - name: ⤵️ Install dependencies
        if: ${{ github.event_name == 'workflow_call' }}
        run: |
          if [ "${{ inputs.use-pnpm }}" = "true" ]; then
              pnpm install
          elif [ "${{ inputs.use-bun }}" = "true" ]; then
              bun install
          else
              yarn install
          fi
        working-directory: ${{ inputs.code-path }}
      - name: 🚀 Run Prettier
        run: |
          if [ "${{ inputs.use-pnpm }}" = "true" ]; then
              pnpx prettier --check ./**/*.${{ inputs.file-types || '{json,yml}' }}
          elif [ "${{ inputs.use-bun }}" = "true" ]; then
              bun run prettier --check ./**/*.${{ inputs.file-types || '{json,yml}' }}
          else
              npx prettier --check ./**/*.${{ inputs.file-types || '{json,yml}' }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ inputs.code-path || '.' }}
