---
name: Release Bun CLI - Linux

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      binary-name:
        description: "Executable and release asset base name"
        required: true
        type: string
      entrypoint:
        description: "Bun entrypoint to compile"
        required: true
        type: string
      package-config:
        description: "nFPM configuration owned by the caller"
        required: true
        type: string
      bun-version:
        description: "Bun version used to install and compile"
        required: false
        type: string
        default: "1.3.14"
      smoke-test-arguments:
        description: >-
          Trusted newline-separated executable argument lists; each line is one invocation
        required: false
        type: string
        default: "--version"
      package-prepare-command:
        description: >-
          Trusted shell command run after compilation and before nFPM packaging
        required: false
        type: string
        default: ""
      prerelease:
        description: "Publish the GitHub release as a prerelease"
        required: false
        type: boolean
        default: true
      release-version:
        description: "Existing release tag; empty allocates YYYYMMDD.N"
        required: false
        type: string
        default: ""
      source-ref:
        description: "Git ref to build; empty uses the triggering SHA"
        required: false
        type: string
        default: ""
      existing-release:
        description: "Upload assets to an existing release without editing it"
        required: false
        type: boolean
        default: false
    outputs:
      release-version:
        description: "Allocated YYYYMMDD.N release version"
        value: ${{ jobs.release.outputs.release-version }}
      source-sha:
        description: "Full source commit SHA used for the release"
        value: ${{ jobs.release.outputs.source-sha }}

permissions:
  contents: read

concurrency:
  group: release-bun-cli-linux-${{ github.repository }}
  cancel-in-progress: false

env:
  # renovate: datasource=github-releases depName=goreleaser/nfpm
  NFPM_VERSION: "2.47.0"

jobs:
  version:
    name: Allocate release version
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.version.outputs.release-version }}
      source-sha: ${{ steps.version.outputs.source-sha }}
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.source-ref || github.sha }}
      - name: Allocate YYYYMMDD.N version
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.release-version }}
        shell: bash
        run: |
          set -euo pipefail

          source_sha="$(git rev-parse HEAD)"
          if [[ -n "$REQUESTED_VERSION" ]]; then
            [[ "$REQUESTED_VERSION" =~ ^[0-9]{8}\.[0-9]+$ ]] || {
              echo "::error::Invalid release version: $REQUESTED_VERSION"
              exit 1
            }
            version="$REQUESTED_VERSION"
          else
            release_date="$(date --utc +%Y%m%d)"
            existing="$(git tag --points-at "$source_sha" --list --sort=-version:refname \
              | grep -E '^[0-9]{8}\.[0-9]+$' | sed -n '1p' || :)"
            if [[ -n "$existing" ]]; then
              version="$existing"
            else
              latest="$(git tag --list "${release_date}.*" --sort=-version:refname | sed -n '1p')"
              if [[ -z "$latest" ]]; then
                sequence=0
              elif [[ "$latest" =~ ^${release_date}\.([0-9]+)$ ]]; then
                sequence=$((BASH_REMATCH[1] + 1))
              else
                echo "::error::Invalid release tag in the ${release_date} series: $latest"
                exit 1
              fi
              version="${release_date}.${sequence}"
            fi
          fi

          echo "release-version=$version" >> "$GITHUB_OUTPUT"
          echo "source-sha=$source_sha" >> "$GITHUB_OUTPUT"

  build:
    name: Build Linux ${{ matrix.architecture }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64
            bun-target: bun-linux-x64-baseline
            deb-architecture: amd64
            nfpm-architecture: amd64
            nfpm-download-architecture: x86_64
            rpm-architecture: x86_64
            runner: ubuntu-24.04
          - architecture: aarch64
            bun-target: bun-linux-arm64
            deb-architecture: arm64
            nfpm-architecture: arm64
            nfpm-download-architecture: arm64
            rpm-architecture: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Validate inputs
        env:
          BINARY_NAME: ${{ inputs.binary-name }}
          ENTRYPOINT: ${{ inputs.entrypoint }}
          PACKAGE_CONFIG: ${{ inputs.package-config }}
        shell: bash
        run: |
          set -euo pipefail

          [[ "$BINARY_NAME" =~ ^[a-z0-9][a-z0-9._+-]*$ ]] || {
            echo "::error::Invalid binary name: $BINARY_NAME"
            exit 1
          }
          for path in "$ENTRYPOINT" "$PACKAGE_CONFIG"; do
            [[ -n "$path" && "$path" != /* && ! "$path" =~ (^|/)\.\.?(/|$) ]] || {
              echo "::error::Paths must be relative and must not contain dot segments: $path"
              exit 1
            }
          done
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ inputs.source-ref || github.sha }}
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ inputs.bun-version }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Compile executable
        env:
          BINARY_NAME: ${{ inputs.binary-name }}
          BUN_TARGET: ${{ matrix.bun-target }}
          ENTRYPOINT: ${{ inputs.entrypoint }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release/root
          bun build "$ENTRYPOINT" --compile --target="$BUN_TARGET" --outfile "dist/release/root/$BINARY_NAME"
      - name: Smoke-test executable
        env:
          BINARY_NAME: ${{ inputs.binary-name }}
          SMOKE_TEST_ARGUMENTS: ${{ inputs.smoke-test-arguments }}
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r invocation || [[ -n "$invocation" ]]; do
            [[ -n "$invocation" ]] || continue
            # This input is trusted caller configuration, not pull request content.
            read -r -a arguments <<< "$invocation"
            "dist/release/root/$BINARY_NAME" "${arguments[@]}"
          done <<< "$SMOKE_TEST_ARGUMENTS"
      - name: Prepare package files
        if: inputs.package-prepare-command != ''
        env:
          PACKAGE_PREPARE_COMMAND: ${{ inputs.package-prepare-command }}
        shell: bash
        run: |
          set -euo pipefail
          # This input is trusted caller configuration, not pull request content.
          bash -euo pipefail -c "$PACKAGE_PREPARE_COMMAND"
      - name: Install nFPM
        env:
          NFPM_DOWNLOAD_ARCHITECTURE: ${{ matrix.nfpm-download-architecture }}
        shell: bash
        run: |
          set -euo pipefail

          archive="nfpm_${NFPM_VERSION}_Linux_${NFPM_DOWNLOAD_ARCHITECTURE}.tar.gz"
          base_url="https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}"
          curl --fail --location --silent --show-error --output "$archive" "$base_url/$archive"
          curl --fail --location --silent --show-error --output checksums.txt "$base_url/checksums.txt"
          grep "  ${archive}$" checksums.txt | sha256sum --check --strict
          tar --extract --gzip --file "$archive" nfpm
          chmod 0755 nfpm
      - name: Build archives and packages
        env:
          ARCH: ${{ matrix.nfpm-architecture }}
          BINARY_NAME: ${{ inputs.binary-name }}
          DEB_ARCHITECTURE: ${{ matrix.deb-architecture }}
          PACKAGE_CONFIG: ${{ inputs.package-config }}
          RELEASE_ARCHITECTURE: ${{ matrix.architecture }}
          RPM_ARCHITECTURE: ${{ matrix.rpm-architecture }}
          VERSION: ${{ needs.version.outputs.release-version }}
        shell: bash
        run: |
          set -euo pipefail

          assets="dist/release/assets"
          mkdir -p "$assets"
          tar --create --sort=name --mtime='@0' --owner=0 --group=0 --numeric-owner \
            --directory=dist/release/root "$BINARY_NAME" \
            | gzip --no-name > "$assets/${BINARY_NAME}-${VERSION}-linux-${RELEASE_ARCHITECTURE}.tar.gz"
          ./nfpm package --config "$PACKAGE_CONFIG" --packager deb \
            --target "$assets/${BINARY_NAME}_${VERSION}_${DEB_ARCHITECTURE}.deb"
          ./nfpm package --config "$PACKAGE_CONFIG" --packager rpm \
            --target "$assets/${BINARY_NAME}-${VERSION}-1.${RPM_ARCHITECTURE}.rpm"
      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ inputs.binary-name }}-${{ matrix.architecture }}-${{ github.run_id }}
          path: dist/release/assets
          if-no-files-found: error
          overwrite: true
          retention-days: 7

  release:
    name: Publish rolling release
    needs:
      - version
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-version: ${{ needs.version.outputs.release-version }}
      source-sha: ${{ needs.version.outputs.source-sha }}
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.source-ref || github.sha }}
      - name: Download x86_64 assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ inputs.binary-name }}-x86_64-${{ github.run_id }}
          path: ${{ runner.temp }}/release-assets
      - name: Download aarch64 assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ inputs.binary-name }}-aarch64-${{ github.run_id }}
          path: ${{ runner.temp }}/release-assets
      - name: Verify assets and create checksums
        env:
          ASSET_ROOT: ${{ runner.temp }}/release-assets
        shell: bash
        run: |
          set -euo pipefail

          expected_assets=6
          actual_assets="$(find "$ASSET_ROOT" -maxdepth 1 -type f | wc -l)"
          [[ "$actual_assets" -eq "$expected_assets" ]] || {
            echo "::error::Expected $expected_assets release assets, found $actual_assets."
            exit 1
          }
          find "$ASSET_ROOT" -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' | sort \
            | while IFS= read -r asset; do
                (cd "$ASSET_ROOT" && sha256sum "$asset")
              done > "$ASSET_ROOT/SHA256SUMS"
          (cd "$ASSET_ROOT" && sha256sum --check --strict SHA256SUMS)
      - name: Publish GitHub prerelease
        env:
          ASSET_ROOT: ${{ runner.temp }}/release-assets
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease }}
          EXISTING_RELEASE: ${{ inputs.existing-release }}
          RELEASE_VERSION: ${{ needs.version.outputs.release-version }}
          SOURCE_SHA: ${{ needs.version.outputs.source-sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$EXISTING_RELEASE" == "true" ]]; then
            gh release view "$RELEASE_VERSION" >/dev/null
            gh release upload "$RELEASE_VERSION" "$ASSET_ROOT"/* --clobber
            exit 0
          fi

          release_exists=false
          if git rev-parse --verify --quiet "refs/tags/$RELEASE_VERSION" >/dev/null; then
            [[ "$(git rev-list -n 1 "$RELEASE_VERSION")" == "$SOURCE_SHA" ]] || {
              echo "::error::Release tag $RELEASE_VERSION already points to another commit."
              exit 1
            }
            gh release view "$RELEASE_VERSION" >/dev/null 2>&1 && release_exists=true
          fi

          if [[ "$release_exists" == "true" ]]; then
            gh release edit "$RELEASE_VERSION" \
              --target "$SOURCE_SHA" \
              --title "$RELEASE_VERSION" \
              --notes "Rolling release $RELEASE_VERSION from commit $SOURCE_SHA." \
              --prerelease="$PRERELEASE"
            gh release upload "$RELEASE_VERSION" "$ASSET_ROOT"/* --clobber
          else
            prerelease_arguments=()
            [[ "$PRERELEASE" == "true" ]] && prerelease_arguments+=(--prerelease)
            gh release create "$RELEASE_VERSION" "$ASSET_ROOT"/* \
              --target "$SOURCE_SHA" \
              --title "$RELEASE_VERSION" \
              --notes "Rolling release $RELEASE_VERSION from commit $SOURCE_SHA." \
              "${prerelease_arguments[@]}"
          fi
