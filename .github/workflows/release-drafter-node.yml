---
name: Release Drafter

# yamllint disable-line rule:truthy
on:
  workflow_call:
    secrets:
      PUSH_TOKEN:
        required: true

jobs:
  release-drafter:
    name: ✏️ Draft release
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Show event name
        run: |
          echo ${{ github.event }}
          echo ${{ github.event_name }}
          echo ${{ github.event_path }}
          echo ${{ github.base_ref }}
          echo ${{ github.actor }}
      - name: 🚀 Run Release Drafter
        id: release-drafter
        uses: release-drafter/release-drafter@v7.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.PUSH_TOKEN }}
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.PUSH_TOKEN }}
      - name: ✏ Set Version File
        run: |
          echo "${{ steps.release-drafter.outputs.tag_name }}"
          npm version ${{ steps.release-drafter.outputs.tag_name }} \
            --allow-same-version \
            --no-git-tag-version
          cat package.json
      - name: ⤵️ Pull latest changes from GitHub
        run: |
          git pull --ff
      - name: 🖊 Commit
        uses: stefanzweifel/git-auto-commit-action@v7.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.PUSH_TOKEN }}
        with:
          commit_message: |
            Update version to ${{ steps.release-drafter.outputs.tag_name }}
          push_options: "--force"
