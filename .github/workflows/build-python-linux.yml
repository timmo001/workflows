---
name: Build Python Linux

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        required: false
        type: string
        # renovate: datasource=python-version depName=python versioning=python
        default: "3.14.6"
      additional-artifacts-name:
        required: false
        type: string
      additional-artifacts-path:
        required: false
        type: string
      code-path:
        required: false
        type: string
        default: "."
      pre-install-command:
        required: false
        type: string

jobs:
  build-python-linux:
    name: 🚀 Build Application - Linux
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
      - name: ⬇️ Download additional artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ inputs.additional-artifacts-name }}
        with:
          name: ${{ inputs.additional-artifacts-name }}
          path: ${{ inputs.additional-artifacts-path }}
      - name: 🏗️ Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          architecture: "x64"
          cache: "pip"
          check-latest: true
          python-version: ${{ inputs.python-version }}
      - name: 🏗️ Install setuptools, wheel
        run: |
          python -V
          pip -V
          pip install --upgrade uv
          uv venv
          uv pip install --upgrade setuptools wheel
      - name: 🚀 Run pre-install-command
        if: ${{ inputs.pre-install-command }}
        run: |
          cd ${{ inputs.code-path }}
          ${{ inputs.pre-install-command }}
      - name: 🏗️ Install package
        run: |
          cd ${{ inputs.code-path }}
          uv pip install .
