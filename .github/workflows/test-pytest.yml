---
name: "Test - Pytest"

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        required: false
        type: string
        # renovate: datasource=python-version depName=python versioning=python
        default: "3.14.6"
      code-path:
        required: false
        type: string
        default: "."
      module-name:
        required: true
        type: string
      pre-run-command:
        required: false
        type: string
    secrets:
      CODECOV_TOKEN:
        required: true

jobs:
  test-pytest:
    name: "🧪 Run pytest"
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
      - name: 🏗️ Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          architecture: "x64"
          cache: "pip"
          check-latest: true
          python-version: ${{ inputs.python-version }}
      - name: 📦 Install test requirements
        run: |
          python -V
          pip -V
          pip install -r requirements_test.txt
          # Ideally this should be part of our dependencies
          # However this plugin is fairly new and doesn't run correctly
          # on a non-GitHub environment.
          pip install --upgrade pytest-github-actions-annotate-failures
        working-directory: ${{ inputs.code-path }}
      - name: 🚀 Run pre-run-command
        if: ${{ inputs.pre-run-command }}
        run: ${{ inputs.pre-run-command }}
        working-directory: ${{ inputs.code-path }}
      - name: 📦 Install package
        run: |
          pip install .
        working-directory: ${{ inputs.code-path }}
      - name: 🧪 Run pytest
        timeout-minutes: 60
        id: pytest-full
        env:
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          python --version
          python -m pytest \
            -qq \
            --timeout=9 \
            --cov="${{ inputs.module-name }}" \
            --cov-report=xml \
            --cov-report=term-missing \
            -o console_output_style=count \
            -p no:sugar \
            tests \
              2>&1 | tee pytest-${{ inputs.module-name }}.txt
        working-directory: ${{ inputs.code-path }}
      - name: "Upload pytest output"
        if: success() || failure() && steps.pytest-full.conclusion == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-${{ github.run_number }}
          path: ${{ inputs.code-path }}/pytest-*.txt
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ inputs.module-name}}
          path: coverage.xml
          overwrite: true
  test-coverage:
    name: "↗️ Upload test coverage to Codecov"
    runs-on: ubuntu-latest
    needs:
      - test-pytest
    timeout-minutes: 10
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
      - name: ⬇️ Download all coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          flags: full-suite
          token: ${{ secrets.CODECOV_TOKEN }}
