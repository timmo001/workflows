---
name: Fallow

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      root:
        description: "Root directory to analyze"
        required: false
        type: string
        default: "."

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fallow:
    name: Fallow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Run Fallow on changed files
        if: github.event_name != 'workflow_dispatch'
        uses: fallow-rs/fallow@85f36fcdf367ea349cb77b6f647f7ae24e755236 # v3.8.0
        with:
          root: ${{ inputs.root }}
          format: sarif
          changed-since: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      - name: Run Fallow full scan
        if: github.event_name == 'workflow_dispatch'
        uses: fallow-rs/fallow@85f36fcdf367ea349cb77b6f647f7ae24e755236 # v3.8.0
        with:
          root: ${{ inputs.root }}
          format: sarif
