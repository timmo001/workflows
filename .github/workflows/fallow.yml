---
name: Fallow

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      root:
        description: "Root directory to analyze"
        required: false
        type: string
        default: "."

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fallow:
    name: Fallow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Run Fallow on changed files
        if: github.event_name != 'workflow_dispatch'
        uses: fallow-rs/fallow@592deffc4a140d7d731ac43abf86975dbdd3ad60 # v2.98.0
        with:
          root: ${{ inputs.root }}
          format: sarif
          changed-since: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      - name: Run Fallow full scan
        if: github.event_name == 'workflow_dispatch'
        uses: fallow-rs/fallow@592deffc4a140d7d731ac43abf86975dbdd3ad60 # v2.98.0
        with:
          root: ${{ inputs.root }}
          format: sarif
