---
name: Fallow

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      root:
        description: "Root directory to analyze"
        required: false
        type: string
        default: "."

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fallow:
    name: Fallow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Run Fallow on changed files
        if: github.event_name != 'workflow_dispatch'
        uses: fallow-rs/fallow@1fe7ae6722408aa817501c164933637a57af56a9 # v2.84.0
        with:
          root: ${{ inputs.root }}
          format: sarif
          changed-since: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      - name: Run Fallow full scan
        if: github.event_name == 'workflow_dispatch'
        uses: fallow-rs/fallow@1fe7ae6722408aa817501c164933637a57af56a9 # v2.84.0
        with:
          root: ${{ inputs.root }}
          format: sarif
