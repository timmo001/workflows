---
name: Fallow

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      root:
        description: "Root directory to analyze"
        required: false
        type: string
        default: "."

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fallow:
    name: Fallow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Run Fallow on changed files
        if: github.event_name != 'workflow_dispatch'
        uses: fallow-rs/fallow@32b3f89fe28c286c85a6b0aed4ec5be120f54da6 # v3.6.0
        with:
          root: ${{ inputs.root }}
          format: sarif
          changed-since: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      - name: Run Fallow full scan
        if: github.event_name == 'workflow_dispatch'
        uses: fallow-rs/fallow@32b3f89fe28c286c85a6b0aed4ec5be120f54da6 # v3.6.0
        with:
          root: ${{ inputs.root }}
          format: sarif
